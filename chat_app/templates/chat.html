<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
</head>
<body>
    
    <header class="chat-header">
        <div class="header-logo">
            <img src="{{ url_for('static', filename='img/logo_icon.png.png') }}" alt="">
            <span>Chat</span>
        </div>
        <div class="header-actions">
            <button class="header-btn">
                <img src="{{ url_for('static', filename='img/notification_icon.png.png') }}" alt="">
            </button>
            <button class="header-btn">
                <img src="{{ url_for('static', filename='img/settings_icon.png.png') }}" alt="">
            </button>
            <button class="avatar-btn">
                <img src="{{ url_for('static', filename='img/avatar.png.png') }}" alt="">
            </button>
        </div>
    </header>

    
<div class="messenger-main-body">

        
    <aside class="chat-sidebar-left">
        
        
        <div class="sidebar-search-block">
            <img src="{{ url_for('static', filename='img/search_icon.png.png') }}" class="search-field-icon" alt="Поиск">
            <input type="text" class="sidebar-search-input" placeholder="Пошук чатів...">
        </div>

        
        <div class="sidebar-divider"></div>

        
        <div class="sidebar-title-row">
            <h2 class="sidebar-main-title">Ваш чат</h2>
            <button class="sidebar-delete-btn" type="button">
                <img src="{{ url_for('static', filename='img/delete_icon.png.png') }}" alt="Удалить">
            </button>
        </div>

        
        <div class="sidebar-cards-list">
            
            
            <div class="sidebar-chat-card">
                <img src="{{ url_for('static', filename='img/avatar.png.png') }}" class="sidebar-chat-avatar" alt="Dream Team">
                <div class="sidebar-card-content">
                    <div class="sidebar-card-top">
                        <span class="sidebar-chat-name font-semibold">Dream Team</span>
                        <span class="sidebar-chat-time">15m ago</span>
                    </div>
                    <p class="sidebar-chat-text text-muted">I just shared the new mockups in Figma</p>
                </div>
            </div>

        
            <div class="sidebar-divider"></div>

            
            <div class="sidebar-chat-card">
                <img src="{{ url_for('static', filename='img/avatar.png.png') }}" class="sidebar-chat-avatar" alt="General Chat">
                <div class="sidebar-card-content">
                    <div class="sidebar-card-top">
                        <span class="sidebar-chat-name font-semibold">General Chat</span>
                        <span class="sidebar-chat-time">2m ago</span>
                    </div>
                    
                    <div class="sidebar-card-bottom-row">
                        <p class="sidebar-chat-text text-muted">Hey everyone! How is the project going?</p>
                        <span class="sidebar-chat-badge">3</span>
                    </div>
                </div>
            </div>

        </div>
        
    </aside>
    <main class="chat-main">
        <header class="chat-header">
            <h2>General Chat</h2>
            <div class="header-icons">
                <button class="search-header-chat"><img src="{{ url_for('static', filename='img/search_icon.png.png') }}"  alt="Search"></button>
                <button class="menu-header-chat"><img src="{{ url_for('static', filename='img/menu_icon.png.png') }}"  alt="Menu"></button>
            </div>
        </header>
        <div class="chat-history">
            <div class="message">
                <img src="{{ url_for('static', filename='img/avatar.png.png') }}" class="avatar" alt="avatar">
                <div>
                    <div class="message-header">
                        <span class="author">Alex</span>
                        <span class="time">9:24 AM</span>
                    </div>
                    <div class="message-text">Hey everyone! Good morning!</div>
                    <div class="reactions">❤️ 5</div>
                </div>
            </div>
            <div class="message">
                <img src="{{ url_for('static', filename='img/avatar.png.png') }}" class="avatar" alt="avatar">
                <div>
                    <div class="message-header">
                        <span class="author">Maria</span>
                        <span class="time">9:26 AM</span>
                    </div>
                    <div message-text>Morning Alex! How was your weekend?</div>
                </div>
            </div>
        </div>
        <div class="chat-footer">
            <img src="{{ url_for('static', filename='img/emoji_icon.png.png') }}" alt="Emoji">
            <input type="text" class="write-message" placeholder="Введіть повідомлення...">
            <button class="send-btn"><img src="{{ url_for('static', filename='img/send_icon.png.png') }}" alt=""></button>
        </div>
    </main>
    <aside class="sidebar-right">
        <div class="users-section">
            <h3 class="users-panel-title">
                <img src="{{ url_for('static', filename='img/users_icon.png.png') }}" class="users-panel-icon" alt="">
                Користувачи <span class="users-panel-count">(24)</span>
            </h3>
            <div class="user-card">
                <img src="{{ url_for('static', filename='img/avatar.png.png') }}" class="user-card-avatar" alt="">
                <span class="user-card-name">Іван Петренко</span>
            </div>
            <div class="user-card">
                <img src="{{ url_for('static', filename='img/avatar.png.png') }}" class="users-panel-icon" alt="">
                <span class="user-card-name">Maria</span>
            </div>
        </div>
    </aside>

</div>
</body>
</html>
