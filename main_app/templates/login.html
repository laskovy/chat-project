{% extends "base.html" %}

{% block title %}Login{% endblock %}

{% block content %}

<div class="container">

    <img
        src="{{ url_for('static', filename='img/world.png.png') }}"
        class="logo"
    >

    <h2>
        Увійти
    </h2>

    <div class="description">
        Введіть вашу електронну пошту та пароль
    </div>

    <form method="POST">
        <input type="email" name = "email" placeholder="name@example.com">

        <input type="password" name = "password" placeholder="********">

        <button>
            Увійти
        </button>
    </form>    
    <div class="image">
        <img src="/static/img/reg.png" alt="img">
    </div>

</div>

{% endblock %}
